<!-- ================= Toolbar ================= -->

<div class="toolbar-wrapper">
  <div class="toolbar">

    <!-- Left controls -->
    <div class="left-group">

      <button
        id="btn-download-template"
        class="btn-template"
        type="button"
      >
        Download Template
      </button>

      <button
        id="btn-upload"
        class="btn-upload"
        type="button"
      >
        📤 Upload New Data
      </button>

      <input
        id="fileInput"
        type="file"
        accept=".xlsx,.xls"
      >

      <!-- Search -->
      <input
        id="searchInput"
        type="search"
        placeholder="Search coal name..."
        style="padding:8px 10px;border-radius:8px;border:1px solid #ddd;min-width:220px;"
      >

      <button
        id="searchBtn"
        class="btn-template"
        type="button"
      >
        Search
      </button>

    </div>


    <!-- Right controls -->
    <div class="right-group">

      <!-- Selection mode toggle -->
      <div class="selection-mode-toggle" role="group" aria-label="Selection mode">
        <button
          id="mode-select-btn"
          class="mode-btn active"
          type="button"
          title="Click checkboxes one by one"
        >
          Select
        </button>
        <button
          id="mode-range-btn"
          class="mode-btn"
          type="button"
          title="Click a start row, then an end row, to select everything in between"
        >
          Select Range
        </button>
      </div>

      <!-- Download selected -->
      <div class="download-dropdown">

        <button
          id="download-selected-btn"
          class="btn-download"
          type="button"
          disabled
        >
          Download Selected ▾
        </button>

        <div
          id="download-menu"
          class="dropdown-menu"
          aria-hidden="true"
        >
          <button type="button" onclick="downloadSelected('excel')">
            Download as Excel
          </button>

          <button type="button" onclick="downloadSelected('pdf')">
            Download as PDF
          </button>
        </div>

      </div>


      <!-- Actions -->
      <button
        id="delete-selected-btn"
        class="btn-delete"
        type="button"
        disabled
      >
        Delete Selected
      </button>

      <button
        id="edit-selected-btn"
        class="btn-upload"
        type="button"
        disabled
      >
        Edit Selected
      </button>

      <button
        id="downloadWholePDFBtn"
        class="btn-download"
        type="button"
      >
        Download whole page as PDF
      </button>

    </div>

  </div>
</div>
